<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirme sua Presença</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    :root {
        --serenity-blue: #92A8D1;
        --serenity-deep: #5E7BB5;
        --gold-accent: #D4AF6A;
        --soft-white: #F7F9FB;
        --text-color: #555;
        --text-dark: #38415A;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Montserrat', sans-serif;
        background-color: var(--soft-white);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
    }

    /* ---------- HEADER ---------- */
    header {
        text-align: center;
        padding: 70px 20px 90px;
        width: 100%;
        position: relative;
        background: linear-gradient(135deg, var(--serenity-blue) 0%, var(--serenity-deep) 100%);
        color: white;
        overflow: hidden;
    }

    .sparkle {
        position: absolute;
        width: 6px;
        height: 6px;
        background: var(--gold-accent);
        border-radius: 50%;
        opacity: 0.7;
        animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
        50% { transform: translateY(-30px) scale(1.4); opacity: 0.9; }
    }

    .eyebrow {
        font-size: 0.8rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.85;
        margin: 0 0 10px;
        animation: fadeDown 1s ease both;
    }

    h1 {
        font-family: 'Great Vibes', cursive;
        font-size: 4.2rem;
        margin: 0;
        text-shadow: 0 4px 18px rgba(0,0,0,0.15);
        animation: fadeDown 1.1s ease both;
    }

    header p.subtitle {
        margin-top: 14px;
        font-weight: 300;
        font-size: 1.05rem;
        opacity: 0.95;
        animation: fadeDown 1.3s ease both;
    }

    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-16px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .wave {
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        line-height: 0;
    }

    /* ---------- CARROSSEL ---------- */
    .carousel-wrapper {
        width: 100%;
        max-width: 820px;
        margin: -40px 0 30px;
        position: relative;
        z-index: 2;
    }

    .carousel-container {
        width: 100%;
        height: 460px;
        overflow: hidden;
        border-radius: 18px;
        position: relative;
        box-shadow: 0 18px 40px rgba(94, 123, 181, 0.25);
        border: 6px solid white;
    }

    .slides {
        display: flex;
        transition: transform 0.6s cubic-bezier(.65,0,.35,1);
        height: 100%;
    }

    .slide {
        min-width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .dots {
        display: flex;
        justify-content: center;
        gap: 7px;
        margin-top: 14px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #C9D5EA;
        cursor: pointer;
        transition: all 0.3s;
    }

    .dot.active {
        background: var(--serenity-deep);
        width: 22px;
        border-radius: 5px;
    }

    /* ---------- FORM ---------- */
    .form-section {
        background: white;
        padding: 45px 40px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(94, 123, 181, 0.12);
        width: 90%;
        max-width: 500px;
        margin-bottom: 60px;
        position: relative;
    }

    .form-section::before {
        content: '';
        position: absolute;
        top: -3px;
        left: 30px;
        right: 30px;
        height: 6px;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(90deg, var(--gold-accent), var(--serenity-blue));
    }

    .form-title {
        text-align: center;
        font-family: 'Great Vibes', cursive;
        font-size: 2.1rem;
        color: var(--serenity-deep);
        margin: 0 0 25px;
    }

    .form-group {
        margin-bottom: 22px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text-dark);
        font-size: 0.93rem;
    }

    input[type="text"] {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid #E2E8F2;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.95rem;
        transition: border-color 0.25s, box-shadow 0.25s;
    }

    input[type="text"]:focus {
        outline: none;
        border-color: var(--serenity-blue);
        box-shadow: 0 0 0 3px rgba(146, 168, 209, 0.25);
    }

    .radio-group {
        display: flex;
        gap: 14px;
    }

    .radio-option {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 500;
        font-size: 0.9rem;
        padding: 12px 10px;
        border: 1.5px solid #E2E8F2;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-dark);
    }

    .radio-option:has(input:checked) {
        border-color: var(--serenity-blue);
        background: rgba(146, 168, 209, 0.1);
        color: var(--serenity-deep);
    }

    .radio-option input {
        accent-color: var(--serenity-deep);
        cursor: pointer;
    }

    #acompanhante-pergunta,
    #acompanhante-wrapper {
        display: none;
        animation: slideIn 0.35s ease both;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--serenity-blue), var(--serenity-deep));
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 8px 20px rgba(94, 123, 181, 0.35);
    }

    button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(94, 123, 181, 0.45);
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    footer {
        text-align: center;
        font-size: 0.8rem;
        color: #A6B1C4;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    @media (max-width: 600px) {
        h1 { font-size: 3.2rem; }
        .carousel-container { height: 320px; }
        .radio-group { flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
    }
</style>
</head>
<body>

<header>
    <div class="sparkle" style="top:15%; left:10%; animation-delay:0s;"></div>
    <div class="sparkle" style="top:65%; left:85%; animation-delay:2s;"></div>
    <div class="sparkle" style="top:30%; left:80%; animation-delay:4s;"></div>
    <div class="sparkle" style="top:75%; left:20%; animation-delay:1s;"></div>
    <div class="sparkle" style="top:45%; left:50%; animation-delay:3s;"></div>

    <p class="eyebrow">Save the Date</p>
    <h1>Confirme sua Presença</h1>
    <p class="subtitle">Sua resposta é muito importante para nós!</p>

    <svg class="wave" viewBox="0 0 1440 80" preserveAspectRatio="none">
        <path fill="#F7F9FB" d="M0,32 C240,80 480,0 720,32 C960,64 1200,16 1440,32 L1440,80 L0,80 Z"></path>
    </svg>
</header>

<div class="carousel-wrapper">
    <div class="carousel-container">
        <div class="slides" id="slide-track">
            <img src="ensaio-248.jpg.jpeg" class="slide" alt="Foto 1">
            <img src="ensaio-263.jpg.jpeg" class="slide" alt="Foto 2">
            <img src="ensaio-267.jpg.jpeg" class="slide" alt="Foto 3">
            <img src="ensaio-275.jpg.jpeg" class="slide" alt="Foto 4">
            <img src="ensaio-313.jpg.jpeg" class="slide" alt="Foto 5">
            <img src="ensaio-320.jpg.jpeg" class="slide" alt="Foto 6">
            <img src="ensaio-334.jpg.jpeg" class="slide" alt="Foto 7">
            <img src="ensaio-393.jpg.jpeg" class="slide" alt="Foto 8">
            <img src="ensaio-395.jpg.jpeg" class="slide" alt="Foto 9">
            <img src="ensaio-397.jpg.jpeg" class="slide" alt="Foto 10">
            <img src="ensaio-439.jpg.jpeg" class="slide" alt="Foto 11">
            <img src="ensaio-386.jpg.jpeg" class="slide" alt="Foto 12">
            <img src="ensaio-428.jpg.jpeg" class="slide" alt="Foto 13">
            <img src="ensaio-232.jpg.jpeg" class="slide" alt="Foto 14">
            <img src="ensaio-426.jpg.jpeg" class="slide" alt="Foto 15">
        </div>
    </div>
    <div class="dots" id="dots"></div>
</div>

<section class="form-section">
    <p class="form-title">RSVP</p>

    <form id="rsvp-form"
          action="https://script.google.com/macros/s/AKfycbyULRi8ed_1XqeiPfXXj0eKVB_VpaTsp-prZxh4WvjGD0-KUpJCTZzU48FvczbVyR8t8w/exec"
          method="POST"
          target="frame-envio">

        <div class="form-group">
            <label for="nome">Seu Nome</label>
            <input type="text" name="nome" id="nome" required>
        </div>

        <div class="form-group">
            <label>Você vai comparecer?</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="comparecimento" value="Sim" required>
                    Sim
                </label>
                <label class="radio-option">
                    <input type="radio" name="comparecimento" value="Não" required>
                    Não
                </label>
            </div>
        </div>

        <div class="form-group" id="acompanhante-pergunta">
            <label>Você vai levar acompanhante?</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="temAcompanhante" value="Sim">
                    Sim
                </label>
                <label class="radio-option">
                    <input type="radio" name="temAcompanhante" value="Não">
                    Não
                </label>
            </div>
        </div>

        <div class="form-group" id="acompanhante-wrapper">
            <label for="nomeAcompanhante">Nome do Acompanhante</label>
            <input type="text" name="nomeAcompanhante" id="nomeAcompanhante">
        </div>

        <button type="submit" id="btn-enviar">Confirmar Presença</button>
    </form>

    <iframe name="frame-envio" style="display:none;"></iframe>
</section>

<footer>Com amor, contamos com você 💙</footer>

<script>
    /* Carrossel com dots */
    const track = document.getElementById('slide-track');
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dots');
    let index = 0;
    let timer;

    slides.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
    });
    const dots = document.querySelectorAll('.dot');

    function goTo(i) {
        index = i;
        track.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        dots[index].classList.add('active');
    }

    function moveCarousel() {
        if (!slides.length) return;
        index = (index + 1) % slides.length;
        goTo(index);
    }

    function startTimer() {
        timer = setInterval(moveCarousel, 4000);
    }
    startTimer();

    /* RSVP form logic */
    const form = document.getElementById('rsvp-form');
    const botao = document.getElementById('btn-enviar');
    const frameEnvio = document.querySelector('iframe[name="frame-envio"]');

    const comparecimentoRadios = document.querySelectorAll('input[name="comparecimento"]');
    const acompanhantePergunta = document.getElementById('acompanhante-pergunta');
    const acompanhanteWrapper = document.getElementById('acompanhante-wrapper');
    const temAcompanhanteRadios = document.querySelectorAll('input[name="temAcompanhante"]');
    const nomeAcompanhanteInput = document.getElementById('nomeAcompanhante');

    comparecimentoRadios.forEach(radio => {
        radio.addEventListener('change', function () {
            if (this.value === 'Sim') {
                acompanhantePergunta.style.display = 'block';
            } else {
                acompanhantePergunta.style.display = 'none';
                acompanhanteWrapper.style.display = 'none';
                temAcompanhanteRadios.forEach(r => r.checked = false);
                nomeAcompanhanteInput.value = '';
                nomeAcompanhanteInput.required = false;
            }
        });
    });

    temAcompanhanteRadios.forEach(radio => {
        radio.addEventListener('change', function () {
            if (this.value === 'Sim') {
                acompanhanteWrapper.style.display = 'block';
                nomeAcompanhanteInput.required = true;
            } else {
                acompanhanteWrapper.style.display = 'none';
                nomeAcompanhanteInput.value = '';
                nomeAcompanhanteInput.required = false;
            }
        });
    });

    form.addEventListener('submit', function (e) {
        const nome = document.getElementById('nome').value.trim();

        if (!nome) {
            e.preventDefault();
            alert('Preencha seu nome.');
            return;
        }

        botao.disabled = true;
        botao.textContent = 'Enviando...';
    });

    frameEnvio.onload = function () {
        botao.disabled = false;
        botao.textContent = 'Confirmar Presença';
        alert('Presença confirmada! Obrigado.');
        form.reset();
        acompanhantePergunta.style.display = 'none';
        acompanhanteWrapper.style.display = 'none';
    };
</script>

</body>
</html>
